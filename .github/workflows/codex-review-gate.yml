name: Codex Review Gate Controller

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  issue_comment:
    types:
      - created
  pull_request_review:
    types:
      - submitted

permissions:
  contents: write
  issues: read
  pull-requests: write
  statuses: write

jobs:
  codex-review-gate-controller:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const repoFullName = `${owner}/${repo}`;
            const gateContext = "codex-review-gate";
            const codexActors = new Set([
              "chatgpt-codex-connector[bot]",
              "chatgpt-codex-connector",
            ]);
            const cleanBodyPatterns = [
              /didn't find any major issues/i,
              /did not find any major issues/i,
              /\bbreezy\b/i,
            ];
            const pollAttempts = 40;
            const pollIntervalMs = 15000;
            const trustCache = new Map();

            async function setStatus(sha, state, description, targetUrl) {
              await github.rest.repos.createCommitStatus({
                owner,
                repo,
                sha,
                state,
                context: gateContext,
                description,
                target_url: targetUrl,
              });
            }

            async function enableAutoMerge(pr) {
              if (pr.draft || pr.base?.ref !== "main" || !isSameRepoPullRequest(pr)) {
                core.info("Skipping auto-merge for draft, external, or non-main PR.");
                return;
              }
              for (let attempt = 1; attempt <= 6; attempt += 1) {
                try {
                  await github.graphql(
                    `
                      mutation EnableAutoMerge($pullRequestId: ID!) {
                        enablePullRequestAutoMerge(
                          input: {
                            pullRequestId: $pullRequestId
                            mergeMethod: SQUASH
                          }
                        ) {
                          pullRequest {
                            number
                            autoMergeRequest {
                              enabledAt
                            }
                          }
                        }
                      }
                    `,
                    { pullRequestId: pr.node_id },
                  );
                  core.info(`Enabled auto-merge for PR #${pr.number}`);
                  return;
                } catch (error) {
                  const message = String(error.message || error);
                  if (message.includes("is already enabled for auto-merge")) {
                    core.info(`Auto-merge already enabled for PR #${pr.number}`);
                    return;
                  }
                  if (message.includes("unstable status") && attempt < 6) {
                    core.info(`PR #${pr.number} still unstable; retrying in 5s (attempt ${attempt}/6)`);
                    await new Promise((resolve) => setTimeout(resolve, 5000));
                    continue;
                  }
                  throw error;
                }
              }
            }

            function isSameRepoPullRequest(pr) {
              return pr?.head?.repo?.full_name === repoFullName;
            }

            function bodyLooksClean(body) {
              return cleanBodyPatterns.some((pattern) => pattern.test(body || ""));
            }

            function isCodexActor(login) {
              return codexActors.has(login || "");
            }

            function reviewRequestCommentBodyMatches(comment) {
              return /@codex\s+review\b/i.test(comment.body || "");
            }

            async function isReviewRequestComment(comment) {
              return !isCodexActor(comment.user?.login) &&
                reviewRequestCommentBodyMatches(comment) &&
                await isTrustedMaintainer(comment.user?.login || "");
            }

            function parseDate(value) {
              return value ? Date.parse(value) || 0 : 0;
            }

            function latestBy(items, field) {
              return [...items].sort((left, right) => parseDate(left[field]) - parseDate(right[field])).at(-1) || null;
            }

            async function isTrustedMaintainer(login) {
              if (!login) {
                return false;
              }
              if (login === owner) {
                return true;
              }
              if (trustCache.has(login)) {
                return trustCache.get(login);
              }
              try {
                const response = await github.rest.repos.getCollaboratorPermissionLevel({
                  owner,
                  repo,
                  username: login,
                });
                const trusted = (response.data.permission || "").toLowerCase() === "admin";
                trustCache.set(login, trusted);
                return trusted;
              } catch (error) {
                if (error.status === 404) {
                  trustCache.set(login, false);
                  return false;
                }
                throw error;
              }
            }

            async function fetchPullRequest(pullNumber) {
              const response = await github.rest.pulls.get({
                owner,
                repo,
                pull_number: pullNumber,
              });
              return response.data;
            }

            async function listIssueComments(issueNumber) {
              return github.paginate(github.rest.issues.listComments, {
                owner,
                repo,
                issue_number: issueNumber,
                per_page: 100,
              });
            }

            async function listReviews(pullNumber) {
              return github.paginate(github.rest.pulls.listReviews, {
                owner,
                repo,
                pull_number: pullNumber,
                per_page: 100,
              });
            }

            async function listPullRequestCommits(pullNumber) {
              return github.paginate(github.rest.pulls.listCommits, {
                owner,
                repo,
                pull_number: pullNumber,
                per_page: 100,
              });
            }

            async function listReactions(commentId) {
              return github.paginate("GET /repos/{owner}/{repo}/issues/comments/{comment_id}/reactions", {
                owner,
                repo,
                comment_id: commentId,
                per_page: 100,
              });
            }

            function extractReviewedCommitFromBody(body) {
              const match = String(body || "").match(/Reviewed commit:\s*`([0-9a-f]{7,40})`/i);
              return match ? match[1].toLowerCase() : "";
            }

            function commentMatchesHeadSha(comment, headSha) {
              const reviewedCommit = extractReviewedCommitFromBody(comment.body || "");
              if (!reviewedCommit) {
                return false;
              }
              const normalizedHeadSha = String(headSha || "").toLowerCase();
              return normalizedHeadSha === reviewedCommit || normalizedHeadSha.startsWith(reviewedCommit);
            }

            async function latestTrustedReviewRequestComment(comments) {
              const matches = [];
              for (const comment of comments) {
                if (await isReviewRequestComment(comment)) {
                  matches.push(comment);
                }
              }
              return latestBy(matches, "created_at");
            }

            async function detectOutcome(pr, options = {}) {
              const { codexCommentId = null } = options;
              const reviews = await listReviews(pr.number);
              const latestReview = latestBy(
                reviews.filter((review) => isCodexActor(review.user?.login) && review.commit_id === pr.head.sha),
                "submitted_at",
              );
              if (latestReview) {
                const reviewState = (latestReview.state || "").toUpperCase();
                const clean =
                  reviewState === "APPROVED" ||
                  (reviewState === "COMMENTED" && bodyLooksClean(latestReview.body || ""));
                return {
                  kind: clean ? "success" : "failure",
                  description: clean
                    ? "Codex review finished without major issues"
                    : "Codex review requires follow-up",
                  targetUrl: latestReview.html_url || pr.html_url,
                };
              }

              const comments = await listIssueComments(pr.number);
              const latestTrigger = await latestTrustedReviewRequestComment(comments);
              const cutoff = parseDate(latestTrigger?.created_at);
              const latestCodexComment = latestBy(
                comments.filter((comment) => {
                  if (!isCodexActor(comment.user?.login) || parseDate(comment.created_at) < cutoff) {
                    return false;
                  }
                  if (comment.id === codexCommentId) {
                    return true;
                  }
                  return commentMatchesHeadSha(comment, pr.head.sha);
                }),
                "created_at",
              );
              if (latestCodexComment) {
                const clean = bodyLooksClean(latestCodexComment.body || "");
                return {
                  kind: clean ? "success" : "failure",
                  description: clean
                    ? "Codex review finished without major issues"
                    : "Codex reported findings; inspect PR comments",
                  targetUrl: latestCodexComment.html_url || pr.html_url,
                };
              }

              if (latestTrigger) {
                const reactions = await listReactions(latestTrigger.id);
                const codexThumbsUp = reactions.some(
                  (reaction) => isCodexActor(reaction.user?.login) && reaction.content === "+1",
                );
                if (codexThumbsUp) {
                  return {
                    kind: "success",
                    description: "Codex acknowledged the latest review request without findings",
                    targetUrl: latestTrigger.html_url || pr.html_url,
                  };
                }
              }

              return {
                kind: "waiting",
                description: "Waiting for Codex review to finish",
                targetUrl: pr.html_url,
              };
            }

            async function commitBelongsToTrustedMaintainer(commit) {
              const authorLogin = commit.author?.login || "";
              const committerLogin = commit.committer?.login || "";
              return (await isTrustedMaintainer(authorLogin)) && (await isTrustedMaintainer(committerLogin));
            }

            async function approvalState(pr) {
              const commits = await listPullRequestCommits(pr.number);
              const trustedOpenedPr = await isTrustedMaintainer(pr.user?.login || "");
              let trustedOnlyCommits = true;
              for (const commit of commits) {
                if (!(await commitBelongsToTrustedMaintainer(commit))) {
                  trustedOnlyCommits = false;
                  break;
                }
              }

              const reviews = await listReviews(pr.number);
              const trustedReviews = [];
              for (const review of reviews) {
                if (review.commit_id !== pr.head.sha) {
                  continue;
                }
                if (await isTrustedMaintainer(review.user?.login || "")) {
                  trustedReviews.push(review);
                }
              }
              const latestDecisiveTrustedReview = latestBy(
                trustedReviews.filter((review) => {
                  const reviewState = (review.state || "").toUpperCase();
                  return reviewState === "APPROVED" || reviewState === "CHANGES_REQUESTED";
                }),
                "submitted_at",
              );
              const reviewState = (latestDecisiveTrustedReview?.state || "").toUpperCase();
              if (reviewState === "CHANGES_REQUESTED") {
                return {
                  satisfied: false,
                  state: "changes-requested",
                  description: "A trusted maintainer requested changes on the current head",
                };
              }
              if (trustedOpenedPr && trustedOnlyCommits) {
                return {
                  satisfied: true,
                  state: "trusted-only",
                  description: "Trusted-maintainer-only submission; no extra approval required",
                };
              }
              if (reviewState === "APPROVED") {
                return {
                  satisfied: true,
                  state: "approved",
                  description: "A trusted maintainer approved the current head after a non-trusted submission",
                };
              }
              return {
                satisfied: false,
                state: "waiting",
                description: "Waiting for a trusted maintainer approval on the current head because this PR is not a trusted-maintainer-only submission",
              };
            }

            async function settleGate(pr, options = {}) {
              const outcome = await detectOutcome(pr, options);
              if (outcome.kind === "waiting") {
                return false;
              }
              if (outcome.kind === "success") {
                const approval = await approvalState(pr);
                if (!approval.satisfied) {
                  await setStatus(
                    pr.head.sha,
                    approval.state === "changes-requested" ? "failure" : "pending",
                    approval.description,
                    outcome.targetUrl,
                  );
                  core.info(`Set ${gateContext}=${approval.state === "changes-requested" ? "failure" : "pending"} on ${pr.head.sha}`);
                  return true;
                }
              }
              await setStatus(
                pr.head.sha,
                outcome.kind === "success" ? "success" : "failure",
                outcome.description,
                outcome.targetUrl,
              );
              if (outcome.kind === "success") {
                await enableAutoMerge(pr);
              }
              core.info(`Set ${gateContext}=${outcome.kind} on ${pr.head.sha}`);
              return true;
            }

            async function pollUntilSettled(pr, targetUrl) {
              for (let attempt = 1; attempt <= pollAttempts; attempt += 1) {
                const latestPr = await fetchPullRequest(pr.number);
                if (latestPr.head.sha !== pr.head.sha) {
                  core.info("PR head changed while polling; letting the next run own the gate.");
                  return;
                }
                const settled = await settleGate(latestPr);
                if (settled) {
                  return;
                }
                if (attempt < pollAttempts) {
                  await new Promise((resolve) => setTimeout(resolve, pollIntervalMs));
                }
              }
              await setStatus(
                pr.head.sha,
                "failure",
                "Codex review did not complete; retrigger @codex review",
                targetUrl,
              );
              core.info(`Set ${gateContext}=failure on ${pr.head.sha} after polling timeout`);
            }

            if (context.eventName === "pull_request") {
              const pr = context.payload.pull_request;
              if (!pr || pr.draft || !isSameRepoPullRequest(pr)) {
                core.info("Skipping pending gate update for draft or external PR.");
                return;
              }
              await setStatus(
                pr.head.sha,
                "pending",
                "Waiting for Codex review to finish",
                pr.html_url,
              );
              core.info(`Set ${gateContext}=pending on ${pr.head.sha}`);
              await pollUntilSettled(pr, pr.html_url);
              return;
            }

            if (context.eventName === "issue_comment") {
              const issue = context.payload.issue;
              const comment = context.payload.comment;
              if (!issue?.pull_request || !comment) {
                core.info("Ignoring non-PR comment event.");
                return;
              }
              const pr = await fetchPullRequest(issue.number);
              if (!isSameRepoPullRequest(pr)) {
                core.info("Ignoring external PR comment event.");
                return;
              }
              if (isCodexActor(comment.user?.login)) {
                await settleGate(pr, { codexCommentId: comment.id });
                return;
              }
              if (!(await isReviewRequestComment(comment))) {
                core.info("Ignoring non-Codex, non-trigger comment.");
                return;
              }
              await setStatus(
                pr.head.sha,
                "pending",
                "Waiting for Codex review to finish",
                comment.html_url,
              );
              core.info(`Set ${gateContext}=pending on ${pr.head.sha}`);
              await pollUntilSettled(pr, comment.html_url);
              return;
            }

            if (context.eventName === "pull_request_review") {
              const review = context.payload.review;
              const pr = context.payload.pull_request;
              const reviewLogin = review?.user?.login || "";
              const trustedReviewer = await isTrustedMaintainer(reviewLogin);
              if (!review || !pr || !isSameRepoPullRequest(pr) || (!isCodexActor(reviewLogin) && !trustedReviewer)) {
                core.info("Ignoring unrelated review event.");
                return;
              }
              await settleGate(pr);
            }
