name: Codex Review Gate Controller

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  pull_request_review:
    types:
      - submitted
      - dismissed

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.event.issue.number || github.run_id }}
  cancel-in-progress: true

permissions:
  checks: read
  contents: read
  issues: read
  pull-requests: read
  statuses: write

env:
  CODEX_TRUSTED_MAINTAINERS: ${{ vars.CODEX_TRUSTED_MAINTAINERS }}

jobs:
  codex-review-gate-controller:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: trusted
          persist-credentials: false
          ref: ${{ github.event.pull_request.base.sha }}
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: pr
          persist-credentials: false
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const path = require("path");
            async function pullRequestTouchesAnyFile(pr, pathsToMatch) {
              const files = await github.paginate(github.rest.pulls.listFiles, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                per_page: 100,
              });
              return files.some((file) => pathsToMatch.has(file.filename));
            }
            async function publishSyncGuardPassed(pr) {
              const owner = context.repo.owner;
              const repo = context.repo.repo;
              const [combined, checks] = await Promise.all([
                github.rest.repos.getCombinedStatusForRef({
                  owner,
                  repo,
                  ref: pr.head.sha,
                }),
                github.rest.checks.listForRef({
                  owner,
                  repo,
                  ref: pr.head.sha,
                  per_page: 100,
                }),
              ]);
              const publishSyncStatus = combined.data.statuses.find(
                (status) => status.context === "publish-sync-guard" && status.state === "success"
              );
              const publishSyncCheck = checks.data.check_runs.find(
                (checkRun) => checkRun.name === "publish-sync-guard" && checkRun.conclusion === "success"
              );
              return Boolean(publishSyncStatus || publishSyncCheck);
            }
            const trustedScriptPath = path.join(
              process.env.GITHUB_WORKSPACE,
              "trusted",
              "owned/skills-github-publisher/scripts/codex_review_gate_controller.cjs",
            );
            const bootstrapScriptPath = path.join(
              process.env.GITHUB_WORKSPACE,
              "pr",
              "owned/skills-github-publisher/scripts/codex_review_gate_controller.cjs",
            );
            const prControlledControllerPaths = new Set([
              "owned/skills-github-publisher/scripts/codex_review_gate_controller.cjs",
              "owned/skills-github-publisher/scripts/codex_review_common.cjs",
            ]);
            let scriptPath = trustedScriptPath;
            const pr = context.payload.pull_request;
            const sameRepoPr = pr && pr.head?.repo?.full_name === `${context.repo.owner}/${context.repo.repo}`;
            const controllerChangedInPr = sameRepoPr
              ? await pullRequestTouchesAnyFile(pr, prControlledControllerPaths)
              : false;
            if (!fs.existsSync(scriptPath) || controllerChangedInPr) {
              if (!sameRepoPr) {
                core.setFailed(
                  "Trusted controller script is missing or PR-controlled controller changes were detected, but PR-side loading is only allowed for same-repo PRs.",
                );
                return;
              }
              if (!(await publishSyncGuardPassed(pr))) {
                core.setFailed(
                  "PR-side controller loading requires publish-sync-guard to be successful on the current head.",
                );
                return;
              }
              scriptPath = bootstrapScriptPath;
            }
            if (!fs.existsSync(scriptPath)) {
              core.setFailed(`Controller script is missing: ${scriptPath}`);
              return;
            }
            core.info(`Using Codex review gate controller from ${scriptPath}`);
            const trustedScript = require(scriptPath);
            await trustedScript.run({
              github,
              context,
              core,
              trustedMaintainers: process.env.CODEX_TRUSTED_MAINTAINERS || "",
            });
