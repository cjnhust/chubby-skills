name: Codex Review Gate Controller

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  issue_comment:
    types:
      - created
  pull_request_review:
    types:
      - submitted

permissions:
  contents: read
  issues: read
  pull-requests: read
  statuses: write

env:
  CODEX_TRUSTED_MAINTAINERS: ${{ vars.CODEX_TRUSTED_MAINTAINERS }}

jobs:
  codex-review-gate-controller:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const repoFullName = `${owner}/${repo}`;
            const gateContext = "codex-review-gate";
            const codexActors = new Set([
              "chatgpt-codex-connector[bot]",
              "chatgpt-codex-connector",
            ]);
            const cleanBodyPatterns = [
              /didn't find any major issues/i,
              /did not find any major issues/i,
              /\bbreezy\b/i,
            ];
            const trustedActors = new Set(
              [owner, ...(process.env.CODEX_TRUSTED_MAINTAINERS || "").split(/[\s,]+/)]
                .map((value) => value.trim())
                .filter(Boolean),
            );

            async function setStatus(sha, state, description, targetUrl) {
              await github.rest.repos.createCommitStatus({
                owner,
                repo,
                sha,
                state,
                context: gateContext,
                description,
                target_url: targetUrl,
              });
            }

            function isSameRepoPullRequest(pr) {
              return pr?.head?.repo?.full_name === repoFullName;
            }

            function bodyLooksClean(body) {
              return cleanBodyPatterns.some((pattern) => pattern.test(body || ""));
            }

            function extractReviewedCommit(body) {
              const match = (body || "").match(/Reviewed commit:\s*`([0-9a-f]{7,40})`/i);
              return match ? match[1].toLowerCase() : null;
            }

            function reviewedCommitMatchesHead(reviewedCommit, headSha) {
              if (!reviewedCommit || !headSha) {
                return false;
              }
              const normalizedReviewed = reviewedCommit.toLowerCase();
              const normalizedHead = headSha.toLowerCase();
              return (
                normalizedReviewed === normalizedHead ||
                normalizedHead.startsWith(normalizedReviewed) ||
                normalizedReviewed.startsWith(normalizedHead)
              );
            }

            function actorIsRelevantForGate(login) {
              return codexActors.has(login || "") || trustedActors.has(login || "");
            }

            async function listPullRequestReviews(pullNumber) {
              return github.paginate(github.rest.pulls.listReviews, {
                owner,
                repo,
                pull_number: pullNumber,
                per_page: 100,
              });
            }

            async function listIssueComments(issueNumber) {
              return github.paginate(github.rest.issues.listComments, {
                owner,
                repo,
                issue_number: issueNumber,
                per_page: 100,
              });
            }

            async function listPullRequestCommits(pullNumber) {
              return github.paginate(github.rest.pulls.listCommits, {
                owner,
                repo,
                pull_number: pullNumber,
                per_page: 100,
              });
            }

            async function currentHeadHasTrustedApproval(pullNumber, headSha) {
              const reviews = await listPullRequestReviews(pullNumber);
              const latestTrustedReviewByActor = new Map();
              for (const review of reviews) {
                const login = review.user?.login || "";
                if (!trustedActors.has(login)) {
                  continue;
                }
                if (!reviewedCommitMatchesHead(review.commit_id || "", headSha)) {
                  continue;
                }
                latestTrustedReviewByActor.set(login, review);
              }
              return [...latestTrustedReviewByActor.values()].some(
                (review) => String(review.state || "").toUpperCase() === "APPROVED",
              );
            }

            async function currentHeadIsTrustedSubmission(pr) {
              if (!trustedActors.has(pr.user?.login || "")) {
                return false;
              }
              const commits = await listPullRequestCommits(pr.number);
              return commits.every((commit) => {
                const candidateLogins = [commit.author?.login, commit.committer?.login].filter(Boolean);
                return candidateLogins.length > 0 && candidateLogins.every((login) => trustedActors.has(login));
              });
            }

            async function currentHeadCodexResult(pullNumber, headSha) {
              const reviews = (await listPullRequestReviews(pullNumber)).slice().reverse();
              for (const review of reviews) {
                const login = review.user?.login || "";
                if (!codexActors.has(login)) {
                  continue;
                }
                if (!reviewedCommitMatchesHead(review.commit_id || "", headSha)) {
                  continue;
                }
                const state = String(review.state || "").toUpperCase();
                const clean =
                  state === "APPROVED" ||
                  (state === "COMMENTED" && bodyLooksClean(review.body || ""));
                return {
                  clean,
                  targetUrl: review.html_url || `https://github.com/${repoFullName}/pull/${pullNumber}`,
                };
              }

              const comments = (await listIssueComments(pullNumber)).slice().reverse();
              for (const comment of comments) {
                const login = comment.user?.login || "";
                if (!codexActors.has(login)) {
                  continue;
                }
                const reviewedCommit = extractReviewedCommit(comment.body || "");
                if (!reviewedCommitMatchesHead(reviewedCommit, headSha)) {
                  continue;
                }
                return {
                  clean: bodyLooksClean(comment.body || ""),
                  targetUrl: comment.html_url,
                };
              }

              return null;
            }

            async function evaluateGate(pr, fallbackTargetUrl) {
              const headSha = pr.head.sha;
              const codexResult = await currentHeadCodexResult(pr.number, headSha);
              if (!codexResult) {
                await setStatus(
                  headSha,
                  "pending",
                  "Waiting for Codex review to finish",
                  pr.html_url,
                );
                core.info(`Set ${gateContext}=pending on ${headSha} because no current-head Codex result exists yet`);
                return;
              }

              if (!codexResult.clean) {
                await setStatus(
                  headSha,
                  "failure",
                  "Codex review requires follow-up",
                  codexResult.targetUrl || fallbackTargetUrl || pr.html_url,
                );
                core.info(`Set ${gateContext}=failure on ${headSha} because current-head Codex reported findings`);
                return;
              }

              const trustedSubmission = await currentHeadIsTrustedSubmission(pr);
              const trustedApproval = trustedSubmission
                ? true
                : await currentHeadHasTrustedApproval(pr.number, headSha);

              if (!trustedApproval) {
                await setStatus(
                  headSha,
                  "failure",
                  "Current head still needs trusted owner/admin approval",
                  pr.html_url,
                );
                core.info(`Set ${gateContext}=failure on ${headSha} because current-head trusted approval is still missing`);
                return;
              }

              await setStatus(
                headSha,
                "success",
                trustedSubmission
                  ? "Codex review finished without major issues"
                  : "Codex review clean and trusted approval present",
                codexResult.targetUrl || fallbackTargetUrl || pr.html_url,
              );
              core.info(`Set ${gateContext}=success on ${headSha}`);
            }

            if (context.eventName === "pull_request") {
              const pr = context.payload.pull_request;
              if (!pr || pr.draft || !isSameRepoPullRequest(pr)) {
                core.info("Skipping pending gate update for draft or external PR.");
                return;
              }
              await setStatus(
                pr.head.sha,
                "pending",
                "Waiting for Codex review to finish",
                pr.html_url,
              );
              core.info(`Set ${gateContext}=pending on ${pr.head.sha}`);
              return;
            }

            if (context.eventName === "issue_comment") {
              const issue = context.payload.issue;
              const comment = context.payload.comment;
              if (!issue?.pull_request || !comment || !codexActors.has(comment.user?.login || "")) {
                core.info("Ignoring non-PR comment or non-Codex actor.");
                return;
              }
              const pr = await github.rest.pulls.get({
                owner,
                repo,
                pull_number: issue.number,
              });
              if (!isSameRepoPullRequest(pr.data)) {
                core.info("Ignoring external PR comment event.");
                return;
              }
              const reviewedCommit = extractReviewedCommit(comment.body || "");
              if (!reviewedCommitMatchesHead(reviewedCommit, pr.data.head.sha)) {
                core.info(
                  `Ignoring Codex comment for reviewed commit ${reviewedCommit || "<missing>"} because current head is ${pr.data.head.sha}`,
                );
                return;
              }
              await evaluateGate(pr.data, comment.html_url);
              return;
            }

            if (context.eventName === "pull_request_review") {
              const review = context.payload.review;
              const pr = context.payload.pull_request;
              if (!review || !pr || !isSameRepoPullRequest(pr) || !actorIsRelevantForGate(review.user?.login || "")) {
                core.info("Ignoring unrelated pull_request_review event.");
                return;
              }
              if (codexActors.has(review.user?.login || "") && !reviewedCommitMatchesHead(review.commit_id || "", pr.head.sha)) {
                core.info(
                  `Ignoring Codex review for commit ${review.commit_id || "<missing>"} because current head is ${pr.head.sha}`,
                );
                return;
              }
              await evaluateGate(pr, review.html_url || pr.html_url);
            }
