name: Codex Review Gate Controller

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  issue_comment:
    types:
      - created
  pull_request_review:
    types:
      - submitted

permissions:
  contents: read
  issues: read
  pull-requests: read
  statuses: write

jobs:
  codex-review-gate-controller:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const repoFullName = `${owner}/${repo}`;
            const gateContext = "codex-review-gate";
            const codexActors = new Set([
              "chatgpt-codex-connector[bot]",
              "chatgpt-codex-connector",
            ]);
            const cleanBodyPatterns = [
              /didn't find any major issues/i,
              /did not find any major issues/i,
              /\bbreezy\b/i,
            ];

            async function setStatus(sha, state, description, targetUrl) {
              await github.rest.repos.createCommitStatus({
                owner,
                repo,
                sha,
                state,
                context: gateContext,
                description,
                target_url: targetUrl,
              });
            }

            function isSameRepoPullRequest(pr) {
              return pr?.head?.repo?.full_name === repoFullName;
            }

            function bodyLooksClean(body) {
              return cleanBodyPatterns.some((pattern) => pattern.test(body || ""));
            }

            if (context.eventName === "pull_request") {
              const pr = context.payload.pull_request;
              if (!pr || pr.draft || !isSameRepoPullRequest(pr)) {
                core.info("Skipping pending gate update for draft or external PR.");
                return;
              }
              await setStatus(
                pr.head.sha,
                "pending",
                "Waiting for Codex review to finish",
                pr.html_url,
              );
              core.info(`Set ${gateContext}=pending on ${pr.head.sha}`);
              return;
            }

            if (context.eventName === "issue_comment") {
              const issue = context.payload.issue;
              const comment = context.payload.comment;
              if (!issue?.pull_request || !comment || !codexActors.has(comment.user?.login || "")) {
                core.info("Ignoring non-PR comment or non-Codex actor.");
                return;
              }
              const pr = await github.rest.pulls.get({
                owner,
                repo,
                pull_number: issue.number,
              });
              if (!isSameRepoPullRequest(pr.data)) {
                core.info("Ignoring external PR comment event.");
                return;
              }
              const clean = bodyLooksClean(comment.body || "");
              await setStatus(
                pr.data.head.sha,
                clean ? "success" : "failure",
                clean
                  ? "Codex review finished without major issues"
                  : "Codex reported findings; inspect PR comments",
                comment.html_url,
              );
              core.info(`Set ${gateContext}=${clean ? "success" : "failure"} on ${pr.data.head.sha}`);
              return;
            }

            if (context.eventName === "pull_request_review") {
              const review = context.payload.review;
              const pr = context.payload.pull_request;
              if (!review || !pr || !codexActors.has(review.user?.login || "") || !isSameRepoPullRequest(pr)) {
                core.info("Ignoring non-Codex review event.");
                return;
              }
              const state = (review.state || "").toUpperCase();
              const clean =
                state === "APPROVED" ||
                (state === "COMMENTED" && bodyLooksClean(review.body || ""));
              await setStatus(
                pr.head.sha,
                clean ? "success" : "failure",
                clean
                  ? "Codex review finished without major issues"
                  : "Codex review requires follow-up",
                review.html_url || pr.html_url,
              );
              core.info(`Set ${gateContext}=${clean ? "success" : "failure"} on ${pr.head.sha}`);
            }
