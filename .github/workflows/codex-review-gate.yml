name: Codex Review Gate Controller

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  pull_request_review:
    types:
      - submitted
      - dismissed

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.event.issue.number || github.run_id }}
  cancel-in-progress: true

permissions:
  checks: read
  contents: read
  issues: read
  pull-requests: read
  statuses: write

env:
  CODEX_TRUSTED_MAINTAINERS: ${{ vars.CODEX_TRUSTED_MAINTAINERS }}

jobs:
  codex-review-gate-controller:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: trusted
          persist-credentials: false
          ref: ${{ github.event.pull_request.base.sha }}
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: pr
          persist-credentials: false
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const path = require("path");
            const trustedScriptPath = path.join(
              process.env.GITHUB_WORKSPACE,
              "trusted",
              "owned/skills-github-publisher/scripts/codex_review_gate_controller.cjs",
            );
            const bootstrapScriptPath = path.join(
              process.env.GITHUB_WORKSPACE,
              "pr",
              "owned/skills-github-publisher/scripts/codex_review_gate_controller.cjs",
            );
            let scriptPath = trustedScriptPath;
            if (!fs.existsSync(scriptPath)) {
              const pr = context.payload.pull_request;
              if (!pr || pr.head?.repo?.full_name !== `${context.repo.owner}/${context.repo.repo}`) {
                core.setFailed("Trusted controller script is missing and bootstrap loading is only allowed for same-repo PRs.");
                return;
              }
              const owner = context.repo.owner;
              const repo = context.repo.repo;
              const [combined, checks] = await Promise.all([
                github.rest.repos.getCombinedStatusForRef({
                  owner,
                  repo,
                  ref: pr.head.sha,
                }),
                github.rest.checks.listForRef({
                  owner,
                  repo,
                  ref: pr.head.sha,
                  per_page: 100,
                }),
              ]);
              const publishSyncStatus = combined.data.statuses.find(
                (status) => status.context === "publish-sync-guard" && status.state === "success"
              );
              const publishSyncCheck = checks.data.check_runs.find(
                (checkRun) => checkRun.name === "publish-sync-guard" && checkRun.conclusion === "success"
              );
              if (!publishSyncStatus && !publishSyncCheck) {
                core.setFailed("Trusted controller script is missing and publish-sync-guard is not successful on the current head.");
                return;
              }
              scriptPath = bootstrapScriptPath;
            }
            if (!fs.existsSync(scriptPath)) {
              core.setFailed(`Controller script is missing: ${scriptPath}`);
              return;
            }
            core.info(`Using Codex review gate controller from ${scriptPath}`);
            const trustedScript = require(scriptPath);
            await trustedScript.run({
              github,
              context,
              core,
              trustedMaintainers: process.env.CODEX_TRUSTED_MAINTAINERS || "",
            });
