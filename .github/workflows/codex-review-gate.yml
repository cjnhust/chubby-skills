name: Codex Review Gate Controller

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  pull_request_review:
    types:
      - submitted
      - dismissed

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.event.issue.number || github.run_id }}
  cancel-in-progress: true

permissions:
  checks: read
  contents: read
  issues: read
  pull-requests: read
  statuses: write

env:
  CODEX_TRUSTED_MAINTAINERS: ${{ vars.CODEX_TRUSTED_MAINTAINERS }}

jobs:
  codex-review-gate-controller:
    if: ${{ github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: trusted
          persist-credentials: false
          ref: ${{ github.event.pull_request.base.sha }}
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: pr
          persist-credentials: false
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const path = require("path");
            async function pullRequestTouchesAnyFile(pr, pathsToMatch) {
              const files = await github.paginate(github.rest.pulls.listFiles, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                per_page: 100,
              });
              return files.some((file) => pathsToMatch.has(file.filename));
            }
            async function publishSyncGuardPassed(pr) {
              const owner = context.repo.owner;
              const repo = context.repo.repo;
              const [combined, checks] = await Promise.all([
                github.rest.repos.getCombinedStatusForRef({
                  owner,
                  repo,
                  ref: pr.head.sha,
                }),
                github.rest.checks.listForRef({
                  owner,
                  repo,
                  ref: pr.head.sha,
                  per_page: 100,
                }),
              ]);
              const publishSyncStatus = combined.data.statuses.find(
                (status) => status.context === "publish-sync-guard" && status.state === "success"
              );
              const publishSyncCheck = checks.data.check_runs.find(
                (checkRun) => checkRun.name === "publish-sync-guard" && checkRun.conclusion === "success"
              );
              return Boolean(publishSyncStatus || publishSyncCheck);
            }
            const trustedScriptPath = path.join(
              process.env.GITHUB_WORKSPACE,
              "trusted",
              "owned/skills-github-publisher/scripts/codex_review_gate_controller.cjs",
            );
            const bootstrapScriptPath = path.join(
              process.env.GITHUB_WORKSPACE,
              "pr",
              "owned/skills-github-publisher/scripts/codex_review_gate_controller.cjs",
            );
            const prControlledControllerPaths = new Set([
              "owned/skills-github-publisher/scripts/codex_review_gate_controller.cjs",
              "owned/skills-github-publisher/scripts/codex_review_common.cjs",
            ]);
            let scriptPath = trustedScriptPath;
            const pr = context.payload.pull_request;
            const sameRepoPr = pr && pr.head?.repo?.full_name === `${context.repo.owner}/${context.repo.repo}`;
            const controllerChangedInPr = sameRepoPr
              ? await pullRequestTouchesAnyFile(pr, prControlledControllerPaths)
              : false;
            if (!fs.existsSync(scriptPath) || controllerChangedInPr) {
              if (!sameRepoPr) {
                core.setFailed(
                  "Trusted controller script is missing or PR-controlled controller changes were detected, but PR-side loading is only allowed for same-repo PRs.",
                );
                return;
              }
              if (!(await publishSyncGuardPassed(pr))) {
                core.setFailed(
                  "PR-side controller loading requires publish-sync-guard to be successful on the current head.",
                );
                return;
              }
              scriptPath = bootstrapScriptPath;
            }
            if (!fs.existsSync(scriptPath)) {
              core.setFailed(`Controller script is missing: ${scriptPath}`);
              return;
            }
            core.info(`Using Codex review gate controller from ${scriptPath}`);
            const trustedScript = require(scriptPath);
            await trustedScript.run({
              github,
              context,
              core,
              trustedMaintainers: process.env.CODEX_TRUSTED_MAINTAINERS || "",
            });

  codex-review-gate-wrapper-validation:
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Validate review gate workflow wrapper invariants
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import subprocess
          import tempfile
          import yaml

          workflow_path = Path(".github/workflows/codex-review-gate.yml")
          workflow = yaml.safe_load(workflow_path.read_text(encoding="utf-8"))
          triggers = workflow.get("on", {})
          for event_name in ("pull_request", "pull_request_target", "pull_request_review"):
            if event_name not in triggers:
              raise SystemExit(f"{workflow_path} must trigger on {event_name}")

          jobs = workflow.get("jobs", {})
          controller_job = jobs.get("codex-review-gate-controller")
          if not isinstance(controller_job, dict):
            raise SystemExit("codex-review-gate-controller job is missing")
          if controller_job.get("if") != "${{ github.event_name != 'pull_request' }}":
            raise SystemExit("codex-review-gate-controller must not run on pull_request")

          wrapper_job = jobs.get("codex-review-gate-wrapper-validation")
          if not isinstance(wrapper_job, dict):
            raise SystemExit("codex-review-gate-wrapper-validation job is missing")
          if wrapper_job.get("if") != "${{ github.event_name == 'pull_request' }}":
            raise SystemExit("codex-review-gate-wrapper-validation must stay limited to pull_request")

          script = controller_job["steps"][-1]["with"]["script"]
          required_snippets = [
            "codex_review_gate_controller.cjs",
            "codex_review_common.cjs",
            "pullRequestTouchesAnyFile",
            "publishSyncGuardPassed",
          ]
          for snippet in required_snippets:
            if snippet not in script:
              raise SystemExit(f"review gate wrapper is missing required snippet: {snippet}")

          wrapped = "async function __wrapper(){\n" + script + "\n}\n"
          with tempfile.NamedTemporaryFile("w", suffix=".js", delete=False, encoding="utf-8") as handle:
            handle.write(wrapped)
            temp_path = handle.name
          try:
            subprocess.run(["node", "--check", temp_path], check=True)
          finally:
            Path(temp_path).unlink(missing_ok=True)

          print(f"wrapper_ok {workflow_path}")
          PY
