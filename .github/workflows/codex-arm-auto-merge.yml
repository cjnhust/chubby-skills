name: Codex Auto Merge Controller

on:
  issue_comment:
    types:
      - created
  pull_request_review:
    types:
      - submitted

permissions:
  contents: write
  issues: read
  pull-requests: write
  statuses: read

jobs:
  codex-arm-auto-merge-controller:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const repoFullName = `${owner}/${repo}`;
            const codexActors = new Set([
              "chatgpt-codex-connector[bot]",
              "chatgpt-codex-connector",
            ]);
            const gateContext = "codex-review-gate";
            const trustCache = new Map();

            async function enableWithRetry(pr) {
              for (let attempt = 1; attempt <= 6; attempt += 1) {
                try {
                  await github.graphql(
                    `
                      mutation EnableAutoMerge($pullRequestId: ID!) {
                        enablePullRequestAutoMerge(
                          input: {
                            pullRequestId: $pullRequestId
                            mergeMethod: SQUASH
                          }
                        ) {
                          pullRequest {
                            number
                            autoMergeRequest {
                              enabledAt
                            }
                          }
                        }
                      }
                    `,
                    { pullRequestId: pr.node_id },
                  );
                  core.info(`Enabled auto-merge for PR #${pr.number}`);
                  return;
                } catch (error) {
                  const message = String(error.message || error);
                  if (message.includes("is already enabled for auto-merge")) {
                    core.info(`Auto-merge already enabled for PR #${pr.number}`);
                    return;
                  }
                  if (message.includes("unstable status") && attempt < 6) {
                    core.info(`PR #${pr.number} still unstable; retrying in 5s (attempt ${attempt}/6)`);
                    await new Promise((resolve) => setTimeout(resolve, 5000));
                    continue;
                  }
                  throw error;
                }
              }
            }

            async function fetchPullRequest(pullNumber) {
              const response = await github.rest.pulls.get({
                owner,
                repo,
                pull_number: pullNumber,
              });
              return response.data;
            }

            async function isTrustedMaintainer(login) {
              if (!login) {
                return false;
              }
              if (login === owner) {
                return true;
              }
              if (trustCache.has(login)) {
                return trustCache.get(login);
              }
              try {
                const response = await github.rest.repos.getCollaboratorPermissionLevel({
                  owner,
                  repo,
                  username: login,
                });
                const trusted = (response.data.permission || "").toLowerCase() === "admin";
                trustCache.set(login, trusted);
                return trusted;
              } catch (error) {
                if (error.status === 404) {
                  trustCache.set(login, false);
                  return false;
                }
                throw error;
              }
            }

            async function gateStateForSha(sha) {
              const response = await github.rest.repos.listCommitStatusesForRef({
                owner,
                repo,
                ref: sha,
                per_page: 100,
              });
              const gateStatus = response.data.find((status) => status.context === gateContext);
              return (gateStatus?.state || "pending").toLowerCase();
            }

            async function waitForGreenGate(pr) {
              for (let attempt = 1; attempt <= 12; attempt += 1) {
                const state = await gateStateForSha(pr.head.sha);
                if (state === "success") {
                  core.info(`Gate ${gateContext}=success for PR #${pr.number}`);
                  return true;
                }
                if (state === "failure") {
                  core.info(`Gate ${gateContext}=failure for PR #${pr.number}; not arming auto-merge.`);
                  return false;
                }
                if (attempt < 12) {
                  core.info(`Gate ${gateContext} still pending for PR #${pr.number}; retrying in 5s (attempt ${attempt}/12)`);
                  await new Promise((resolve) => setTimeout(resolve, 5000));
                }
              }
              core.info(`Gate ${gateContext} did not turn green in time for PR #${pr.number}.`);
              return false;
            }

            let pr = null;
            if (context.eventName === "issue_comment") {
              const issue = context.payload.issue;
              const comment = context.payload.comment;
              if (!issue?.pull_request || !comment || !codexActors.has(comment.user?.login || "")) {
                core.info("Ignoring non-PR comment or non-Codex actor.");
                return;
              }
              pr = await fetchPullRequest(issue.number);
            } else if (context.eventName === "pull_request_review") {
              const review = context.payload.review;
              const incomingPr = context.payload.pull_request;
              const reviewLogin = review?.user?.login || "";
              const trustedReviewer = await isTrustedMaintainer(reviewLogin);
              if (!review || !incomingPr || (!codexActors.has(reviewLogin) && !trustedReviewer)) {
                core.info("Ignoring unrelated review.");
                return;
              }
              pr = incomingPr;
            }

            if (!pr || pr.draft || pr.base?.ref !== "main" || pr.head?.repo?.full_name !== repoFullName) {
              core.info("Skipping draft, external, or non-main PR.");
              return;
            }

            if (!(await waitForGreenGate(pr))) {
              return;
            }
            await enableWithRetry(pr);
