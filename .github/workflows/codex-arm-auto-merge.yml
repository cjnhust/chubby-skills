name: Codex Auto Merge Controller

on:
  pull_request_review:
    types:
      - submitted

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.event.issue.number || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: write
  issues: read
  pull-requests: write

env:
  CODEX_TRUSTED_MAINTAINERS: ${{ vars.CODEX_TRUSTED_MAINTAINERS }}

jobs:
  codex-arm-auto-merge-controller:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const repoFullName = `${owner}/${repo}`;
            const codexActors = new Set([
              "chatgpt-codex-connector[bot]",
              "chatgpt-codex-connector",
            ]);
            const trustedActors = new Set(
              [owner, ...(process.env.CODEX_TRUSTED_MAINTAINERS || "").split(/[\s,]+/)]
                .map((value) => value.trim())
                .filter(Boolean),
            );

            function reviewedCommitMatchesHead(reviewedCommit, headSha) {
              if (!reviewedCommit || !headSha) {
                return false;
              }
              const normalizedReviewed = reviewedCommit.toLowerCase();
              const normalizedHead = headSha.toLowerCase();
              return (
                normalizedReviewed === normalizedHead ||
                normalizedHead.startsWith(normalizedReviewed) ||
                normalizedReviewed.startsWith(normalizedHead)
              );
            }

            function actorCanTriggerEvaluation(login) {
              return codexActors.has(login || "") || trustedActors.has(login || "");
            }

            async function listPullRequestReviews(pullNumber) {
              return github.paginate(github.rest.pulls.listReviews, {
                owner,
                repo,
                pull_number: pullNumber,
                per_page: 100,
              });
            }

            async function listPullRequestCommits(pullNumber) {
              return github.paginate(github.rest.pulls.listCommits, {
                owner,
                repo,
                pull_number: pullNumber,
                per_page: 100,
              });
            }

            async function currentHeadHasTrustedApproval(pullNumber, headSha) {
              const reviews = await listPullRequestReviews(pullNumber);
              const latestTrustedReviewByActor = new Map();
              for (const review of reviews) {
                const login = review.user?.login || "";
                if (!trustedActors.has(login)) {
                  continue;
                }
                if (!reviewedCommitMatchesHead(review.commit_id || "", headSha)) {
                  continue;
                }
                latestTrustedReviewByActor.set(login, review);
              }
              return [...latestTrustedReviewByActor.values()].some(
                (review) => String(review.state || "").toUpperCase() === "APPROVED",
              );
            }

            async function currentHeadIsTrustedSubmission(pr) {
              if (!trustedActors.has(pr.user?.login || "")) {
                return false;
              }
              const commits = await listPullRequestCommits(pr.number);
              return commits.every((commit) => {
                const candidateLogins = [commit.author?.login, commit.committer?.login].filter(Boolean);
                return candidateLogins.length > 0 && candidateLogins.every((login) => trustedActors.has(login));
              });
            }

            async function currentHeadHasCodexReview(pullNumber, headSha) {
              const reviews = (await listPullRequestReviews(pullNumber)).slice().reverse();
              for (const review of reviews) {
                const login = review.user?.login || "";
                if (!codexActors.has(login)) {
                  continue;
                }
                if (!reviewedCommitMatchesHead(review.commit_id || "", headSha)) {
                  continue;
                }
                if (String(review.state || "").toUpperCase() === "DISMISSED") {
                  continue;
                }
                return true;
              }

              return false;
            }

            async function enableWithRetry(pr) {
              for (let attempt = 1; attempt <= 6; attempt += 1) {
                try {
                  await github.graphql(
                    `
                      mutation EnableAutoMerge($pullRequestId: ID!) {
                        enablePullRequestAutoMerge(
                          input: {
                            pullRequestId: $pullRequestId
                            mergeMethod: SQUASH
                          }
                        ) {
                          pullRequest {
                            number
                            autoMergeRequest {
                              enabledAt
                            }
                          }
                        }
                      }
                    `,
                    { pullRequestId: pr.node_id },
                  );
                  core.info(`Enabled auto-merge for PR #${pr.number}`);
                  return;
                } catch (error) {
                  const message = String(error.message || error);
                  if (message.includes("is already enabled for auto-merge")) {
                    core.info(`Auto-merge already enabled for PR #${pr.number}`);
                    return;
                  }
                  if (message.includes("unstable status") && attempt < 6) {
                    core.info(`PR #${pr.number} still unstable; retrying in 5s (attempt ${attempt}/6)`);
                    await new Promise((resolve) => setTimeout(resolve, 5000));
                    continue;
                  }
                  throw error;
                }
              }
            }

            let pr = null;
            if (context.eventName === "pull_request_review") {
              const review = context.payload.review;
              const incomingPr = context.payload.pull_request;
              if (!review || !incomingPr || !actorCanTriggerEvaluation(review.user?.login || "")) {
                core.info("Ignoring unrelated review event.");
                return;
              }
              if (codexActors.has(review.user?.login || "") && !reviewedCommitMatchesHead(review.commit_id || "", incomingPr.head?.sha || "")) {
                core.info(
                  `Ignoring Codex review for commit ${review.commit_id || "<missing>"} because current head is ${incomingPr.head?.sha || "<missing>"}`,
                );
                return;
              }
              pr = incomingPr;
            }

            if (!pr || pr.draft || pr.base?.ref !== "main" || pr.head?.repo?.full_name !== repoFullName) {
              core.info("Skipping draft, external, or non-main PR.");
              return;
            }

            const hasCodexReview = await currentHeadHasCodexReview(pr.number, pr.head.sha);
            if (!hasCodexReview) {
              core.info("Current head does not yet have a Codex review; not arming auto-merge.");
              return;
            }

            const trustedSubmission = await currentHeadIsTrustedSubmission(pr);
            const trustedApproval = trustedSubmission
              ? true
              : await currentHeadHasTrustedApproval(pr.number, pr.head.sha);
            if (!trustedApproval) {
              core.info("Current head is not trusted and lacks trusted approval; not arming auto-merge.");
              return;
            }

            await enableWithRetry(pr);
