name: Codex Auto Merge Controller

on:
  issue_comment:
    types:
      - created
  pull_request_review:
    types:
      - submitted

permissions:
  contents: write
  issues: read
  pull-requests: write

jobs:
  codex-arm-auto-merge-controller:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const repoFullName = `${owner}/${repo}`;
            const codexActors = new Set([
              "chatgpt-codex-connector[bot]",
              "chatgpt-codex-connector",
            ]);
            const cleanBodyPatterns = [
              /didn't find any major issues/i,
              /did not find any major issues/i,
              /\bbreezy\b/i,
            ];

            function bodyLooksClean(body) {
              return cleanBodyPatterns.some((pattern) => pattern.test(body || ""));
            }

            function extractReviewedCommit(body) {
              const match = (body || "").match(/Reviewed commit:\s*`([0-9a-f]{7,40})`/i);
              return match ? match[1].toLowerCase() : null;
            }

            function reviewedCommitMatchesHead(reviewedCommit, headSha) {
              if (!reviewedCommit || !headSha) {
                return false;
              }
              const normalizedReviewed = reviewedCommit.toLowerCase();
              const normalizedHead = headSha.toLowerCase();
              return (
                normalizedReviewed === normalizedHead ||
                normalizedHead.startsWith(normalizedReviewed) ||
                normalizedReviewed.startsWith(normalizedHead)
              );
            }

            async function enableWithRetry(pr) {
              for (let attempt = 1; attempt <= 6; attempt += 1) {
                try {
                  await github.graphql(
                    `
                      mutation EnableAutoMerge($pullRequestId: ID!) {
                        enablePullRequestAutoMerge(
                          input: {
                            pullRequestId: $pullRequestId
                            mergeMethod: SQUASH
                          }
                        ) {
                          pullRequest {
                            number
                            autoMergeRequest {
                              enabledAt
                            }
                          }
                        }
                      }
                    `,
                    { pullRequestId: pr.node_id },
                  );
                  core.info(`Enabled auto-merge for PR #${pr.number}`);
                  return;
                } catch (error) {
                  const message = String(error.message || error);
                  if (message.includes("is already enabled for auto-merge")) {
                    core.info(`Auto-merge already enabled for PR #${pr.number}`);
                    return;
                  }
                  if (message.includes("unstable status") && attempt < 6) {
                    core.info(`PR #${pr.number} still unstable; retrying in 5s (attempt ${attempt}/6)`);
                    await new Promise((resolve) => setTimeout(resolve, 5000));
                    continue;
                  }
                  throw error;
                }
              }
            }

            let pr = null;
            if (context.eventName === "issue_comment") {
              const issue = context.payload.issue;
              const comment = context.payload.comment;
              if (!issue?.pull_request || !comment || !codexActors.has(comment.user?.login || "")) {
                core.info("Ignoring non-PR comment or non-Codex actor.");
                return;
              }
              if (!bodyLooksClean(comment.body || "")) {
                core.info("Codex comment did not indicate a clean review; not arming auto-merge.");
                return;
              }
              const response = await github.rest.pulls.get({
                owner,
                repo,
                pull_number: issue.number,
              });
              pr = response.data;
              const reviewedCommit = extractReviewedCommit(comment.body || "");
              if (!reviewedCommitMatchesHead(reviewedCommit, pr.head?.sha || "")) {
                core.info(
                  `Ignoring Codex comment for reviewed commit ${reviewedCommit || "<missing>"} because current head is ${pr.head?.sha || "<missing>"}`,
                );
                return;
              }
            } else if (context.eventName === "pull_request_review") {
              const review = context.payload.review;
              const incomingPr = context.payload.pull_request;
              if (!review || !incomingPr || !codexActors.has(review.user?.login || "")) {
                core.info("Ignoring non-Codex review.");
                return;
              }
              if (!reviewedCommitMatchesHead(review.commit_id || "", incomingPr.head?.sha || "")) {
                core.info(
                  `Ignoring Codex review for commit ${review.commit_id || "<missing>"} because current head is ${incomingPr.head?.sha || "<missing>"}`,
                );
                return;
              }
              const state = (review.state || "").toUpperCase();
              const clean =
                state === "APPROVED" ||
                (state === "COMMENTED" && bodyLooksClean(review.body || ""));
              if (!clean) {
                core.info("Codex review was not clean; not arming auto-merge.");
                return;
              }
              pr = incomingPr;
            }

            if (!pr || pr.draft || pr.base?.ref !== "main" || pr.head?.repo?.full_name !== repoFullName) {
              core.info("Skipping draft, external, or non-main PR.");
              return;
            }

            await enableWithRetry(pr);
