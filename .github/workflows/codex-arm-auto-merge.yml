name: Codex Auto Merge Controller

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  pull_request_target:
    types:
      - reopened
      - synchronize
      - ready_for_review
  pull_request_review:
    types:
      - submitted
      - dismissed

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.event.issue.number || github.run_id }}
  cancel-in-progress: true

permissions:
  checks: read
  contents: write
  issues: read
  pull-requests: write
  statuses: read

env:
  CODEX_TRUSTED_MAINTAINERS: ${{ vars.CODEX_TRUSTED_MAINTAINERS }}

jobs:
  codex-arm-auto-merge-controller:
    if: ${{ github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: trusted
          persist-credentials: false
          ref: ${{ github.event.pull_request.base.sha }}
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: pr
          persist-credentials: false
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const path = require("path");
            const scriptPath = path.join(
              process.env.GITHUB_WORKSPACE,
              "trusted",
              "owned/skills-github-publisher/scripts/codex_arm_auto_merge_controller.cjs",
            );
            if (!fs.existsSync(scriptPath)) {
              core.info(`Trusted auto-merge controller is not on the base branch yet: ${scriptPath}`);
              core.info("Skipping privileged auto-merge evaluation; PR-side controller execution is covered by codex-arm-auto-merge-wrapper-validation.");
              return;
            }
            core.info(`Using trusted Codex auto-merge controller from ${scriptPath}`);
            const trustedScript = require(scriptPath);
            await trustedScript.run({
              github,
              context,
              core,
              trustedMaintainers: process.env.CODEX_TRUSTED_MAINTAINERS || "",
            });

  codex-arm-auto-merge-wrapper-validation:
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Validate auto-merge workflow wrapper invariants
        run: |
          ruby <<'RUBY'
          require "yaml"
          require "tempfile"

          workflow_path = ".github/workflows/codex-arm-auto-merge.yml"
          raw = File.read(workflow_path)
          workflow = YAML.safe_load(raw, permitted_classes: [], aliases: true)
          triggers = workflow["on"] || workflow[true] || {}
          %w[pull_request pull_request_target pull_request_review].each do |event_name|
            raise "#{workflow_path} must trigger on #{event_name}" unless triggers.key?(event_name)
          end

          jobs = workflow["jobs"] || {}
          controller_job = jobs["codex-arm-auto-merge-controller"]
          raise "codex-arm-auto-merge-controller job is missing" unless controller_job.is_a?(Hash)
          wrapper_job = jobs["codex-arm-auto-merge-wrapper-validation"]
          raise "codex-arm-auto-merge-wrapper-validation job is missing" unless wrapper_job.is_a?(Hash)

          expected_controller_if = "${" + "{ github.event_name != 'pull_request' }}"
          expected_wrapper_if = "${" + "{ github.event_name == 'pull_request' }}"
          raise "codex-arm-auto-merge-controller must not run on pull_request" unless raw.include?("codex-arm-auto-merge-controller:\n    if: #{expected_controller_if}")
          raise "codex-arm-auto-merge-wrapper-validation must stay limited to pull_request" unless raw.include?("codex-arm-auto-merge-wrapper-validation:\n    if: #{expected_wrapper_if}")

          script = controller_job.fetch("steps").last.fetch("with").fetch("script")
          [
            "codex_arm_auto_merge_controller.cjs",
            "Using trusted Codex auto-merge controller",
          ].each do |snippet|
            raise "auto-merge wrapper is missing required snippet: #{snippet}" unless script.include?(snippet)
          end
          [
            "bootstrapScriptPath",
            "pullRequestTouchesAnyFile",
            "publishSyncGuardPassed",
          ].each do |snippet|
            raise "auto-merge wrapper must not execute PR-controlled code in privileged context: #{snippet}" if script.include?(snippet)
          end

          Tempfile.create(["codex-arm-auto-merge", ".js"]) do |handle|
            handle.write("async function __wrapper(){\n#{script}\n}\n")
            handle.flush
            raise "auto-merge wrapper javascript is invalid" unless system("node", "--check", handle.path)
          end

          wrapper_scripts = wrapper_job.fetch("steps", []).filter_map do |step|
            next unless step.is_a?(Hash)
            step.dig("with", "script")
          end
          dry_run_script = wrapper_scripts.find { |candidate| candidate.include?("validationOnly: true") }
          raise "auto-merge wrapper validation must dry-run the PR controller" unless dry_run_script
          raise "auto-merge wrapper validation must load the PR controller module" unless dry_run_script.include?("codex_arm_auto_merge_controller.cjs")

          puts "wrapper_ok #{workflow_path}"
          RUBY
      - name: Dry-run PR auto-merge controller
        uses: actions/github-script@v7
        with:
          script: |
            const path = require("path");
            const scriptPath = path.join(
              process.env.GITHUB_WORKSPACE,
              "owned/skills-github-publisher/scripts/codex_arm_auto_merge_controller.cjs",
            );
            const controller = require(scriptPath);
            const validationContext = {
              ...context,
              payload: {
                ...context.payload,
                pull_request: {
                  ...context.payload.pull_request,
                  head: {
                    ...context.payload.pull_request?.head,
                    repo: {
                      ...context.payload.pull_request?.head?.repo,
                      full_name: `${context.repo.owner}/${context.repo.repo}`,
                    },
                  },
                },
              },
            };
            await controller.run({
              github,
              context: validationContext,
              core,
              trustedMaintainers: process.env.CODEX_TRUSTED_MAINTAINERS || "",
              validationOnly: true,
            });
