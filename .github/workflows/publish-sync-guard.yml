name: Publish Sync Guard

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: read

jobs:
  publish-sync-guard:
    if: ${{ github.event_name == 'pull_request_target' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: trusted
          persist-credentials: false
          ref: ${{ github.event.pull_request.base.sha }}
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: pr
          persist-credentials: false
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Fetch base commit into PR checkout
        working-directory: pr
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          BASE_REPOSITORY: ${{ github.repository }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          git remote add upstream "https://github.com/${BASE_REPOSITORY}.git"
          git fetch --no-tags upstream "${BASE_REF}"
          git cat-file -e "${BASE_SHA}^{commit}"

      - name: Materialize trusted allowed signers
        env:
          PUBLISH_SYNC_ALLOWED_SIGNERS_B64: ${{ vars.PUBLISH_SYNC_ALLOWED_SIGNERS_B64 }}
          PR_HEAD_REPO_FULL_NAME: ${{ github.event.pull_request.head.repo.full_name }}
          REPO_FULL_NAME: ${{ github.repository }}
        run: |
          trusted_signers_path="$GITHUB_WORKSPACE/trusted/.publish-sync/.trusted-allowed-signers"
          repo_variable_signers_path="$GITHUB_WORKSPACE/trusted/.publish-sync/.repo-variable-allowed-signers"
          base_signers_path="$GITHUB_WORKSPACE/trusted/.publish-sync/.base-allowed-signers"
          trusted_base_signers_path="$GITHUB_WORKSPACE/trusted/.publish-sync/allowed_signers"
          pr_signers_path="$GITHUB_WORKSPACE/pr/.publish-sync/allowed_signers"
          mkdir -p "$(dirname "$trusted_signers_path")"
          if [ -n "${PUBLISH_SYNC_ALLOWED_SIGNERS_B64}" ]; then
            printf '%s' "${PUBLISH_SYNC_ALLOWED_SIGNERS_B64}" | base64 --decode > "$repo_variable_signers_path"
          fi
          if [ -f "$trusted_base_signers_path" ]; then
            cp "$trusted_base_signers_path" "$base_signers_path"
          fi

          if [ -f "$repo_variable_signers_path" ] && [ -f "$pr_signers_path" ] && cmp -s "$repo_variable_signers_path" "$pr_signers_path"; then
            cp "$repo_variable_signers_path" "$trusted_signers_path"
          elif [ -f "$base_signers_path" ]; then
            cp "$base_signers_path" "$trusted_signers_path"
          elif [ -f "$repo_variable_signers_path" ]; then
            cp "$repo_variable_signers_path" "$trusted_signers_path"
          else
            echo "Missing trusted allowed signers in the base branch and PUBLISH_SYNC_ALLOWED_SIGNERS_B64 is unset." >&2
            echo "Preseed PUBLISH_SYNC_ALLOWED_SIGNERS_B64 or merge a trusted base-branch signer set before enabling publish-sync-guard bootstrap." >&2
            exit 1
          fi

      - name: Resolve manifest signer identity
        id: signer_identity
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          manifest_path = Path("pr/.publish-sync/manifest.json")
          signer_identity = "publish-sync"
          if manifest_path.exists():
            payload = json.loads(manifest_path.read_text(encoding="utf-8"))
            raw_identity = payload.get("signer_identity")
            if not isinstance(raw_identity, str) or not raw_identity.strip():
              raise SystemExit("publish sync manifest signer identity is missing")
            signer_identity = raw_identity.strip()

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as handle:
            handle.write(f"signer_identity={signer_identity}\n")
          PY

      - run: |
          python3 trusted/owned/skills-github-publisher/scripts/verify_publish_sync.py \
            --root pr \
            --base-sha "${{ github.event.pull_request.base.sha }}" \
            --head-sha "${{ github.event.pull_request.head.sha }}" \
            --allowed-signers-path "$GITHUB_WORKSPACE/trusted/.publish-sync/.trusted-allowed-signers" \
            --signer-identity "${{ steps.signer_identity.outputs.signer_identity }}"

      - name: Exercise PR publish-sync verifier when it changes
        if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
        working-directory: pr
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          SIGNER_IDENTITY: ${{ steps.signer_identity.outputs.signer_identity }}
          GITHUB_TOKEN: ""
          GH_TOKEN: ""
        run: |
          if git diff --quiet "${BASE_SHA}" "${HEAD_SHA}" -- \
            owned/skills-github-publisher/scripts/verify_publish_sync.py \
            owned/skills-github-publisher/scripts/publish_sync_manifest.py \
            owned/skills-github-publisher/scripts/sync_incremental_update.py; then
            echo "PR publish-sync verifier is unchanged; trusted verifier run is sufficient."
            exit 0
          fi

          python3 owned/skills-github-publisher/scripts/verify_publish_sync.py \
            --root . \
            --base-sha "${BASE_SHA}" \
            --head-sha "${HEAD_SHA}" \
            --allowed-signers-path "$GITHUB_WORKSPACE/trusted/.publish-sync/.trusted-allowed-signers" \
            --signer-identity "${SIGNER_IDENTITY}"

  publish-sync-guard-wrapper-validation:
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Validate publish-sync workflow wrapper invariants
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import yaml

          workflow_path = Path(".github/workflows/publish-sync-guard.yml")
          workflow = yaml.safe_load(workflow_path.read_text(encoding="utf-8"))
          triggers = workflow.get("on", {})
          for event_name in ("pull_request", "pull_request_target"):
            if event_name not in triggers:
              raise SystemExit(f"{workflow_path} must trigger on {event_name}")

          jobs = workflow.get("jobs", {})
          main_job = jobs.get("publish-sync-guard")
          if not isinstance(main_job, dict):
            raise SystemExit("publish-sync-guard job is missing")
          if main_job.get("if") != "${{ github.event_name == 'pull_request_target' }}":
            raise SystemExit("publish-sync-guard job must stay limited to pull_request_target")

          wrapper_job = jobs.get("publish-sync-guard-wrapper-validation")
          if not isinstance(wrapper_job, dict):
            raise SystemExit("publish-sync-guard-wrapper-validation job is missing")
          if wrapper_job.get("if") != "${{ github.event_name == 'pull_request' }}":
            raise SystemExit("publish-sync-guard-wrapper-validation must stay limited to pull_request")

          run_blocks = "\n\n".join(step.get("run", "") for step in main_job.get("steps", []) if isinstance(step, dict))
          required_snippets = [
            "trusted/owned/skills-github-publisher/scripts/verify_publish_sync.py",
            "owned/skills-github-publisher/scripts/verify_publish_sync.py",
            "owned/skills-github-publisher/scripts/publish_sync_manifest.py",
            "owned/skills-github-publisher/scripts/sync_incremental_update.py",
          ]
          for snippet in required_snippets:
            if snippet not in run_blocks:
              raise SystemExit(f"publish-sync-guard wrapper is missing required path: {snippet}")

          print(f"wrapper_ok {workflow_path}")
          PY
